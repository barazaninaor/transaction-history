<div class="transactions-container">
  <app-main-header
    title="Transaction History"
    subtitle="Review your recent stock market activities"
  ></app-main-header>

  <div *ngIf="statusMessage" [class]="'status-box ' + statusType">
    {{ statusMessage }}
  </div>

  <div class="add-trade-form">
    <input [(ngModel)]="newTransaction.stock.ticker" placeholder="Ticker" />
    <input
      [(ngModel)]="newTransaction.shares"
      type="number"
      placeholder="Shares"
    />
    <input
      [(ngModel)]="newTransaction.price"
      type="number"
      placeholder="Price"
    />

    <select [(ngModel)]="newTransaction.operation.operationId">
      <option value="1">BUY</option>
      <option value="2">SELL</option>
    </select>

    <button (click)="saveTrade()">
      {{ isEditing ? "Update Trade" : "Add Trade" }}
    </button>
    <button *ngIf="isEditing" (click)="resetForm()">Cancel</button>
  </div>

  <div class="search-bar">
    <input [(ngModel)]="tickerSearch" placeholder="Search by Ticker" />
    <button class="search-btn" (click)="searchByTicker()">Search</button>
    <button class="reset-btn" (click)="resetSearch()">Reset</button>
  </div>

  <table class="styled-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Ticker</th>
        <th>Company Name</th>
        <th>Operation</th>
        <th>Shares</th>
        <th>Price</th>
        <th>Total</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of transactions">
        <td>{{ t.transactionDate | date: "dd-MM-yyyy" }}</td>
        <td>{{ t.stock.ticker }}</td>
        <td>{{ t.stock.companyName }}</td>
        <td>{{ t.operation.operationName }}</td>
        <td>{{ t.shares }}</td>
        <td>{{ t.price | currency }}</td>
        <td>{{ t.shares * t.price | currency }}</td>
        <td>
          <div class="action-buttons">
            <button class="edit-btn" (click)="editTrade(t)">Edit</button>
            <button class="delete-btn" (click)="deleteTrade(t.transactionId)">
              Delete
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
